# ============================================================
# Nginx 站点配置 - AI Work Buddy
# 在宝塔面板中: 网站 → 设置 → 配置文件，替换为以下内容
#
# 注意: 请将 <YOUR_DOMAIN> 替换为你的实际域名
#       请将 <PROJECT_PATH> 替换为项目实际路径（如 /www/wwwroot/ai-work-buddy）
# ============================================================

server {
    listen 80;
    server_name <YOUR_DOMAIN>;

    root <PROJECT_PATH>/build;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ── API 代理 ─────────────────────────────────────────────
    # 转发 /api/ 请求到 Express 后端（localhost:3000）
    # 注意：proxy_pass 不加尾部斜杠，保留 /api/ 前缀
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 前端路由（SPA 回退）──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建文件名含 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}
